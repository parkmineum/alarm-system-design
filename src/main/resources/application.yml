spring:
  application:
    name: notification-practice
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:23306/notification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:notification}
    password: ${DB_PASSWORD:notification}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 28080

notification:
  worker:
    poll-interval-ms: 1000
    batch-size: 50
  processing-timeout:
    check-interval-ms: 60000

springdoc:
  override-with-generic-response: false
